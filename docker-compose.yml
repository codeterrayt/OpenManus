# docker-compose.yml
# Spins up PostgreSQL (required) + pgAdmin (optional DB GUI)
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose down           # stop
#   docker compose down -v        # stop + wipe data volumes
#
# The schema.sql is mounted into /docker-entrypoint-initdb.d/ so Postgres
# creates all tables and seeds the built-in skills automatically on first start.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: openmanus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       openmanus
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-runs schema.sql on first container creation
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openmanus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── pgAdmin 4 (optional — web UI for the DB) ────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: openmanus-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@openmanus.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:   # persists DB data across restarts
  pgadmin_data:    # persists pgAdmin saved connections
